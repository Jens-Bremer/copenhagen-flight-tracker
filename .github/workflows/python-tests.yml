name: Python Tests

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Create config.py from template
      run: cp config.example.py config.py

    - name: Run tests with pytest
      run: |
        python -m pytest tests/ --ignore=tests/browser

    # Browser smoke tests run on one Python version only — the Playwright
    # browser install is ~150 MB and the smoke test is Python-version
    # independent. Skipping on the other matrix entries keeps CI fast.
    - name: Install Playwright browser
      if: matrix.python-version == '3.10'
      run: playwright install --with-deps chromium

    - name: Run browser smoke tests
      if: matrix.python-version == '3.10'
      run: python -m pytest tests/browser/
